{{ $brandName := site.Params.brand.headerTitle | default site.Title }}
<header class="site-header">
  <a class="site-brand" href="{{ site.Home.RelPermalink }}">
    <span class="site-brand-mark">encanta</span>
    <span class="site-brand-text">{{ $brandName }}</span>
  </a>

  <div class="site-header-actions">
    <nav class="site-nav" aria-label="Primary">
      {{ range site.Menus.main }}
        <a href="{{ .URL }}">{{ .Name }}</a>
      {{ end }}
    </nav>

    <button class="theme-toggle" type="button" data-theme-toggle aria-label="Toggle theme" title="Toggle theme">
      <span class="theme-toggle-icon" aria-hidden="true"></span>
    </button>
  </div>
</header>
